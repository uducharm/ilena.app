<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="robots" content="noindex, nofollow">
  <title>Ilena</title>
  <script>
    var languages = (navigator.languages && navigator.languages.length)
      ? navigator.languages
      : [navigator.language || 'en'];
    var locale = null;
    for (var i = 0; i < languages.length; i++) {
      var primary = languages[i].split('-')[0].toLowerCase();
      if (primary === 'fr' || primary === 'es') {
        locale = primary;
        break;
      }
    }
    if (!locale) locale = 'en';
    window.location.replace(locale + '/');
  </script>
</head>
<body></body>
</html>
